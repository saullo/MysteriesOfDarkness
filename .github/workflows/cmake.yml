name: Build

on: [ push, pull_request ]

jobs:
  build-linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        arch: [ x86, x64 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install ninja-build libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev

      - name: Configure
        run: cmake --preset ${{ matrix.arch }}-release

      - name: Build
        run: cmake --build --preset ${{ matrix.arch }}-release --config Release